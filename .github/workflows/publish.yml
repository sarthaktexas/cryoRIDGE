# Publish cryoem-halfmap-qc to PyPI on GitHub release tags (v*).
#
# One-time setup:
#   1. Create https://pypi.org/manage/account/register/
#   2. Add trusted publisher on PyPI for this repo (Settings → Publishing)
#   3. Tag: git tag v0.3.1 && git push origin v0.3.1
#
# Until then, install from GitHub:
#   pip install "git+https://github.com/sarthaktexas/cryoem-halfmap-qc.git@v0.3.1"

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
