<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      font: 12px/1.45 "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 12px;
      color: #1e1e1e;
    }
    h1 { font-size: 13px; font-weight: 600; margin: 0 0 4px; }
    h2 { font-size: 11px; font-weight: 600; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.04em; color: #555; }
    .sub { color: #666; margin: 0 0 12px; font-size: 11px; }
    label { display: block; font-weight: 500; margin: 10px 0 4px; }
    select, input[type="number"], input[type="color"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font: inherit;
      background: #fff;
    }
    input[type="color"] { height: 32px; padding: 2px; cursor: pointer; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: #0d99ff;
      color: #fff;
    }
    button:hover { background: #007be5; }
    button.secondary { background: #eef6ff; color: #0d5cab; border: 1px solid #b8d9f7; margin-top: 8px; }
    button.secondary:hover { background: #dceeff; }
    label.inline {
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 10px 0 0;
    }
    label.inline input { width: auto; margin: 0; }
    .status { margin-top: 10px; font-size: 11px; min-height: 16px; }
    .status.error { color: #c62828; }
    .status.ok { color: #2e7d32; }
    hr { border: none; border-top: 1px solid #eee; margin: 14px 0; }
  </style>
</head>
<body>
  <h1>Thesis Grid Schematic</h1>
  <p class="sub">Protein → half-maps → ρ̄ → V → reliability → build zones</p>

  <div class="row">
    <div>
      <label for="gridSize">Grid size</label>
      <input type="number" id="gridSize" min="4" max="16" step="1" value="8" />
    </div>
    <div>
      <label for="seed">Seed</label>
      <input type="number" id="seed" min="0" step="1" placeholder="random" />
    </div>
  </div>

  <label for="archetype">Protein archetype</label>
  <select id="archetype">
    <option value="auto">Auto (rotate by seed)</option>
    <option value="tetramer">Tetramer</option>
    <option value="kcsa">Ion channel (pore)</option>
    <option value="gpcr">Membrane protein</option>
  </select>

  <label for="disagreement">Flexible-region disagreement</label>
  <input type="number" id="disagreement" min="0" max="1" step="0.05" value="0.55" />

  <label class="inline">
    <input type="checkbox" id="include3d" />
    Slope mesh (h₁, h₂, ρ̄)
  </label>

  <button id="generatePipeline">Generate pipeline</button>

  <hr />

  <h2>Grid operation</h2>
  <p class="sub">Select one grid → apply a pipeline step. Output is placed to the right.</p>

  <label for="gridOperation">Operation</label>
  <select id="gridOperation">
    <option value="gradient_v">Constraint V (from ρ̄)</option>
    <option value="reliability">Reliability score (rank input)</option>
    <option value="build_zones">Build zones (terciles of input)</option>
    <option value="normalize_in_mask">Normalize in mask</option>
  </select>

  <label for="maskThreshold">Mask threshold (ρ maps only)</label>
  <input type="number" id="maskThreshold" min="0" max="1" step="0.01" value="0.12" />

  <button class="secondary" id="applyGridOperation">Apply to selection</button>

  <hr />

  <h2>Mesh from grid</h2>
  <p class="sub">Select a grid frame. Values are min–max normalized (0 = base, 1 = peak) before drawing the wireframe.</p>

  <label for="topoColor">Line color</label>
  <input type="color" id="topoColor" value="#8b84d7" />

  <button class="secondary" id="generateTopology">Generate mesh from selection</button>

  <div id="status" class="status"></div>

  <script>
    var statusEl = document.getElementById("status");

    function colorPayload(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16) / 255,
        g: parseInt(hex.slice(3, 5), 16) / 255,
        b: parseInt(hex.slice(5, 7), 16) / 255,
      };
    }

    document.getElementById("generatePipeline").onclick = function () {
      statusEl.textContent = "";
      statusEl.className = "status";
      var seedRaw = document.getElementById("seed").value;
      parent.postMessage({
        pluginMessage: {
          type: "generatePipeline",
          gridSize: parseInt(document.getElementById("gridSize").value, 10) || 8,
          seed: seedRaw === "" ? undefined : parseInt(seedRaw, 10),
          disagreement: parseFloat(document.getElementById("disagreement").value),
          include3d: document.getElementById("include3d").checked,
          archetype: document.getElementById("archetype").value,
        },
      }, "*");
    };

    document.getElementById("applyGridOperation").onclick = function () {
      statusEl.textContent = "";
      statusEl.className = "status";
      parent.postMessage({
        pluginMessage: {
          type: "applyGridOperation",
          operation: document.getElementById("gridOperation").value,
          maskThreshold: parseFloat(document.getElementById("maskThreshold").value),
        },
      }, "*");
    };

    document.getElementById("generateTopology").onclick = function () {
      statusEl.textContent = "";
      statusEl.className = "status";
      parent.postMessage({
        pluginMessage: {
          type: "generateTopology",
          baseColor: colorPayload(document.getElementById("topoColor").value),
        },
      }, "*");
    };

    window.onmessage = function (event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === "result") {
        statusEl.textContent = msg.text;
        statusEl.className = "status ok";
      }
      if (msg.type === "error") {
        statusEl.textContent = msg.text;
        statusEl.className = "status error";
      }
    };
  </script>
</body>
</html>
