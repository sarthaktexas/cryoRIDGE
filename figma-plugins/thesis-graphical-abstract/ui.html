  <h1>Graphical Abstract</h1>
  <p class="sub">Exemplar map in the 2.5–4 Å atomic-building regime.</p>

  <div class="cohort-box" id="cohortSummary">Loading cohort data…</div>

  <label for="title">Headline</label>
  <input type="text" id="title" value="Local density statistics guide cryo-EM model building" />

  <label for="subtitle">Subtitle</label>
  <input type="text" id="subtitle" value="" />

  <label for="layout">Layout</label>
  <select id="layout">
    <option value="horizontal">Three panels in a row</option>
    <option value="two_plus_mini">Two scatters + mini calibration</option>
    <option value="panels_only">Panels only (no sidebar)</option>
  </select>

  <label class="inline">
    <input type="checkbox" id="includeSidebar" checked />
    Include pipeline sidebar
  </label>

  <label class="inline">
    <input type="checkbox" id="includeTakeaway" checked />
    Include takeaway footer (real AUC numbers)
  </label>

  <button id="generate">Generate graphical abstract</button>

  <hr />

  <h2>Single panel</h2>
  <label for="singlePanel">Panel</label>
  <select id="singlePanel">
    <option value="locres_q">Local resolution vs Q-score</option>
    <option value="reliability_q">Reliability vs Q-score</option>
    <option value="calibration">Reliability decile calibration</option>
    <option value="predictor_auc">Low-Q detection AUC</option>
  </select>
  <button class="secondary" id="generateSingle">Generate single panel</button>

  <div id="status" class="status"></div>

  <script>
    var statusEl = document.getElementById("status");
    var cohortData = null;

    function loadCohortData() {
      var el = document.getElementById("cohort-data");
      if (!el) throw new Error("Missing cohort data. Run: uv run python scripts/run_graphical_abstract_export.py");
      cohortData = JSON.parse(el.textContent);
      var s = cohortData.stats;
      var scope = cohortData.scope || {};
      var nRes = cohortData.n_residues_pooled.toLocaleString();
      var label = scope.display_name
        ? "EMD-" + scope.emdb_id + " · " + scope.display_name
        : "EMD-" + (scope.emdb_id || "?");
      document.getElementById("cohortSummary").innerHTML =
        "<strong>Exemplar export</strong> " + cohortData.generated_at + "<br>" +
        label + " · " + (scope.global_resolution_a || "?") + " Å · " + (scope.regime_label || "2.5–4 Å") + "<br>" +
        (scope.selection_note || "") + "<br>" +
        nRes + " in-mask Cα<br>" +
        "ρ(Q, reliability) = <strong>" + fmtRho(s.spearman_q_vs_reliability) + "</strong> · " +
        "ρ(Q, V) = <strong>" + fmtRho(s.spearman_q_vs_v) + "</strong> · " +
        "ρ(Q, locRes) = <strong>" + fmtRho(s.spearman_q_vs_locres) + "</strong><br>" +
        "Low-Q AUC: reliability <strong>" + s.reliability_median_auc.toFixed(2) + "</strong> · " +
        "BlocRes <strong>" + s.locres_median_auc.toFixed(2) + "</strong>";
      document.getElementById("subtitle").value =
        label + " (" + (scope.regime_label || "2.5–4 Å") + "): ρ(Q, reliability)=" +
        fmtRho(s.spearman_q_vs_reliability) + " at in-mask Cα";
    }

    function fmtRho(v) {
      return (v >= 0 ? "+" : "") + Number(v).toFixed(3);
    }

    function basePayload() {
      if (!cohortData) throw new Error("Cohort data not loaded");
      return {
        title: document.getElementById("title").value,
        subtitle: document.getElementById("subtitle").value,
        layout: document.getElementById("layout").value,
        includeSidebar: document.getElementById("includeSidebar").checked,
        includeTakeaway: document.getElementById("includeTakeaway").checked,
        cohortData: cohortData,
      };
    }

    document.getElementById("generate").onclick = function () {
      statusEl.textContent = "";
      statusEl.className = "status";
      try {
        parent.postMessage({ pluginMessage: Object.assign({ type: "generateAbstract" }, basePayload()) }, "*");
      } catch (e) {
        statusEl.textContent = e.message;
        statusEl.className = "status error";
      }
    };

    document.getElementById("generateSingle").onclick = function () {
      statusEl.textContent = "";
      statusEl.className = "status";
      try {
        parent.postMessage({
          pluginMessage: Object.assign({
            type: "generateSinglePanel",
            panel: document.getElementById("singlePanel").value,
          }, basePayload()),
        }, "*");
      } catch (e) {
        statusEl.textContent = e.message;
        statusEl.className = "status error";
      }
    };

    window.onmessage = function (event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === "result") {
        statusEl.textContent = msg.text;
        statusEl.className = "status ok";
      }
      if (msg.type === "error") {
        statusEl.textContent = msg.text;
        statusEl.className = "status error";
      }
    };

    try { loadCohortData(); } catch (e) {
      document.getElementById("cohortSummary").textContent = e.message;
      document.getElementById("cohortSummary").style.color = "#c62828";
    }
  </script>

</body>
</html>
