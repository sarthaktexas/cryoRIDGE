        "EMD-" + exportData.emdb_a + " vs EMD-" + exportData.emdb_b + "<br>" +
        "n = <strong>" + (exportData.n_residues || "?") + "</strong> in-mask Cα · " +
        "ρ = <strong>" + fmtRho(exportData.spearman_rho) + "</strong><br>" +
        (exportData.generated_at || "(not refreshed)");
      if (!panel.points || !panel.points.length) {
        statusEl.textContent = "No scatter points embedded — run export script first.";
        statusEl.className = "status error";
      }
    }

    document.getElementById("generate").onclick = function () {
      statusEl.textContent = "Building…";
      statusEl.className = "status";
      parent.postMessage({
        pluginMessage: {
          type: "generate",
          exportData: exportData,
        },
      }, "*");
    };

    window.onmessage = function (event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === "result") {
        statusEl.textContent = msg.text;
        statusEl.className = "status ok";
      } else if (msg.type === "error") {
        statusEl.textContent = msg.text;
        statusEl.className = "status error";
      }
    };

    try {
      loadExportData();
    } catch (e) {
      document.getElementById("summary").textContent = String(e);
      statusEl.textContent = String(e);
      statusEl.className = "status error";
    }
  </script>
</body>
</html>
