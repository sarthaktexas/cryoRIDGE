  <h1>Q vs V by Class</h1>
  <p class="sub">Cohort box-strip from <code>qscore_correlations.csv</code>.</p>

  <div class="info-box" id="summary">Run export script to embed data…</div>

  <button id="generate">Generate in Figma</button>

  <div id="status" class="status"></div>

  <script>
    var statusEl = document.getElementById("status");
    var exportData = null;

    function fmtRho(v) {
      if (v == null || !isFinite(v)) return "n/a";
      return (v >= 0 ? "+" : "") + Number(v).toFixed(2);
    }

    function loadExportData() {
      var el = document.getElementById("q-vs-v-by-class-data");
      if (!el) throw new Error("Missing export data block.");
      exportData = JSON.parse(el.textContent);
      var panel = exportData.panel || {};
      var groups = panel.groups || [];
      var nStructures = exportData.n_structures || exportData.n_maps ||
        groups.reduce(function (s, g) { return s + (g.n || 0); }, 0);
      document.getElementById("summary").innerHTML =
        "<strong>Cohort export</strong> " + (exportData.generated_at || "(not refreshed)") + "<br>" +
        nStructures + " structures · <strong>" + groups.length + "</strong> protein classes<br>" +
        "cohort median ρ = <strong>" + fmtRho(exportData.cohort_median) + "</strong>";
      if (!groups.length) {
        statusEl.textContent = "No groups embedded — run export script first.";
        statusEl.className = "status error";
      }
    }

    document.getElementById("generate").onclick = function () {
      statusEl.textContent = "Building…";
      statusEl.className = "status";
      parent.postMessage({
        pluginMessage: {
          type: "generate",
          exportData: exportData,
        },
      }, "*");
    };

    window.onmessage = function (event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === "result") {
        statusEl.textContent = msg.text;
        statusEl.className = "status ok";
      } else if (msg.type === "error") {
        statusEl.textContent = msg.text;
        statusEl.className = "status error";
      }
    };

    try {
      loadExportData();
    } catch (e) {
      document.getElementById("summary").textContent = String(e);
      statusEl.textContent = String(e);
      statusEl.className = "status error";
    }
  </script>
