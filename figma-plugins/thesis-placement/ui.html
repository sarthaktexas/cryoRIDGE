  <h1>Placement Utility</h1>
  <p class="sub">Head-to-head predictors &amp; rank recovery vs Q-score.</p>

  <div class="info-box" id="summary">Run export script to embed data…</div>

  <label for="mode">Generate</label>
  <select id="mode">
    <option value="all">All figures (head-to-head + ρ + ROC)</option>
    <option value="both">Head-to-head + rank recovery</option>
    <option value="head_to_head">Head-to-head predictors (3 panels)</option>
    <option value="rank_recovery">Rank recovery (median ρ bars)</option>
    <option value="low_q_roc">Low-Q ROC (representative maps)</option>
  </select>

  <button id="generate">Generate in Figma</button>

  <div id="status" class="status"></div>

  <script>
    var statusEl = document.getElementById("status");
    var exportData = null;

    function loadExportData() {
      var el = document.getElementById("placement-data");
      if (!el) throw new Error("Missing export data block.");
      exportData = JSON.parse(el.textContent);
      var h2h = (exportData.panels && exportData.panels.head_to_head) || {};
      var rr = (exportData.panels && exportData.panels.rank_recovery) || {};
      var roc = (exportData.panels && exportData.panels.low_q_roc) || {};
      var nPred = (h2h.predictors || []).length;
      var nProxies = (rr.bars || []).length;
      var nRoc = (roc.curves || []).length;
      document.getElementById("summary").innerHTML =
        "<strong>Placement export</strong> " + (exportData.generated_at || "(not refreshed)") + "<br>" +
        (exportData.n_maps || "?") + " maps · Q &lt; <strong>" +
        (exportData.q_threshold != null ? exportData.q_threshold.toFixed(1) : "?") + "</strong><br>" +
        "<strong>" + nPred + "</strong> predictors · <strong>" + nProxies + "</strong> ρ proxies · " +
        "<strong>" + (exportData.n_roc_maps || nRoc) + "</strong> ROC maps · " +
        "<strong>" + nRoc + "</strong> curves";
      if (!nPred && !nProxies && !nRoc) {
        statusEl.textContent = "No data embedded — run export script first.";
        statusEl.className = "status error";
      }
    }

    document.getElementById("generate").onclick = function () {
      statusEl.textContent = "Building…";
      statusEl.className = "status";
      parent.postMessage({
        pluginMessage: {
          type: "generate",
          mode: document.getElementById("mode").value,
          data: exportData
        }
      }, "*");
    };

    window.onmessage = function (event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === "done") {
        statusEl.textContent = "Created: " + msg.name;
        statusEl.className = "status ok";
      } else if (msg.type === "error") {
        statusEl.textContent = msg.message;
        statusEl.className = "status error";
      }
    };

    try {
      loadExportData();
    } catch (e) {
      statusEl.textContent = e.message;
      statusEl.className = "status error";
    }
  </script>
</body>
</html>
